<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="screen-orientation" content="landscape" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Farmer World</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #1b2e16;
      }
      body {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1b2e16;
        touch-action: none;
      }
      #game-container {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #game-container canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        /* Pixel-art: avoid browser smoothing when canvas CSS size ≠ backing store */
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      /* Mobile browser dev only; APK is landscape-locked (manifest + Screen Orientation). */
      @media (orientation: portrait) and (display-mode: browser) {
        html {
          transform: rotate(90deg);
          transform-origin: left top;
          width: 100vh;
          height: 100vw;
          overflow: hidden;
          position: absolute;
          top: 100%;
          left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
